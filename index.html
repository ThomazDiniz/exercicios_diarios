<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Rotina de Treino</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Rotina de Treino</h1>
      <div class="day-tabs" role="tablist">
        <button type="button" class="tab active" data-treino="A" aria-selected="true">Treino A — Peito & Tríceps</button>
        <button type="button" class="tab" data-treino="B" aria-selected="false">Treino B — Pernas</button>
        <button type="button" class="tab" data-treino="C" aria-selected="false">Treino C — Costas & Ombros</button>
        <button type="button" class="tab" data-treino="cardio" aria-selected="false">Cardio</button>
      </div>
      <section class="videos-legais" id="videos-legais" aria-label="Dicas">
        <h2 class="videos-legais-title">Dicas</h2>
        <div class="videos-legais-grid" id="videos-legais-grid"></div>
      </section>
    </header>

    <main class="main">
      <section id="treino-A" class="treino-panel active" aria-hidden="false">
        <h2>Treino A — Peito e Tríceps</h2>
        <div id="exercises-A" class="exercises-grid"></div>
      </section>
      <section id="treino-B" class="treino-panel" aria-hidden="true">
        <h2>Treino B — Pernas e Posterior</h2>
        <div id="exercises-B" class="exercises-grid"></div>
      </section>
      <section id="treino-C" class="treino-panel" aria-hidden="true">
        <h2>Treino C — Costas, Bíceps e Ombros</h2>
        <div id="exercises-C" class="exercises-grid"></div>
      </section>
      <section id="treino-cardio" class="treino-panel" aria-hidden="true">
        <h2>Cardio — Corrida ou Bike</h2>
        <div id="exercises-cardio" class="exercises-grid"></div>
      </section>
    </main>

    <footer class="footer">
      <button type="button" id="reset-day" class="btn-reset">Reiniciar treino do dia</button>
      <p class="hint">Progresso salvo só até o fim do dia. <kbd>Enter</kbd> marca o próximo; <kbd>Backspace</kbd> ou <kbd>Z</kbd> desmarca o último.</p>
    </footer>
  </div>
  <div id="image-zoom-overlay" class="image-zoom-overlay" aria-hidden="true">
    <img src="" alt="" class="image-zoom-img">
  </div>
  <div id="video-overlay" class="video-overlay" aria-hidden="true">
    <div class="video-overlay-inner">
      <button type="button" class="video-overlay-close" id="video-overlay-close" aria-label="Fechar vídeo">×</button>
      <p class="video-overlay-title" id="video-overlay-title"></p>
      <div class="video-overlay-player" id="video-overlay-player"></div>
    </div>
  </div>
  <div id="congrats-overlay" class="congrats-overlay" aria-hidden="true">
    <div class="congrats-inner" role="alertdialog" aria-live="polite" aria-labelledby="congrats-title" aria-describedby="congrats-desc">
      <div class="congrats-timer-wrap" aria-hidden="true">
        <svg class="congrats-timer" viewBox="0 0 36 36" width="52" height="52">
          <circle class="congrats-timer-bg" cx="18" cy="18" r="15" fill="none"></circle>
          <circle class="congrats-timer-progress" cx="18" cy="18" r="15" fill="none"></circle>
        </svg>
      </div>
      <p class="congrats-title" id="congrats-title">Parabéns!</p>
      <p class="congrats-text" id="congrats-desc">Você concluiu todas as atividades do dia.</p>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
